server {
    listen 80;
    listen [::]:80;
    server_name mcp.meo-mai-moi.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mcp.meo-mai-moi.com;

    access_log /var/log/nginx/mcp.meo-mai-moi.com_access.log;
    error_log /var/log/nginx/mcp.meo-mai-moi.com_error.log error;

    ssl_certificate /etc/letsencrypt/live/mcp.meo-mai-moi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.meo-mai-moi.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 1m;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        proxy_pass http://127.0.0.1:8020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
